server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Resolver DNS para proxy_pass dinamico (variables en URL).
    # Necesario porque /s/<slug> proxea a Supabase con $socio_slug interpolado.
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    resolver_timeout 10s;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://js.stripe.com https://maps.googleapis.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com https://maps.googleapis.com https://nominatim.openstreetmap.org https://fcm.googleapis.com https://firebaseinstallations.googleapis.com https://www.gstatic.com;" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Assets estaticos cacheables
    location ~* \.(js|css|png|jpg|jpeg|webp|gif|svg|ico|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service Worker no se cachea
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Manifest PWA
    location = /manifest.json {
        expires off;
        add_header Cache-Control "no-cache";
        add_header Content-Type "application/manifest+json";
    }

    # index.html nunca cache
    location = /index.html {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Apple Pay / Stripe domain verification
    location /.well-known/ {
        root /usr/share/nginx/html;
        default_type text/plain;
        add_header Cache-Control "no-cache";
    }

    # Tienda publica del socio: proxea SIEMPRE a la edge function og-socio-html.
    # Esa edge baja el index.html actual de pidoo.es y le inyecta los meta tags
    # del socio (logo, nombre comercial, descripcion). Asi tanto crawlers de
    # redes sociales como usuarios reales reciben el HTML correcto.
    # Si la edge falla por cualquier motivo, se sirve el index.html SPA normal.
    location ~ ^/s/([a-zA-Z0-9][a-zA-Z0-9-]{0,80})/?$ {
        set $socio_slug $1;
        set $sb_anon "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtcmJ4cmFibmdkbXBncGZtamJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzAyNTksImV4cCI6MjA4OTYwNjI1OX0.Aj2VoA6XWcokJDJdhBwfNXnLCUEOlQfTdB0std1SNWE";
        proxy_set_header Host rmrbxrabngdmpgpfmjbo.supabase.co;
        proxy_set_header Authorization "Bearer $sb_anon";
        proxy_set_header apikey $sb_anon;
        proxy_ssl_server_name on;
        proxy_ssl_name rmrbxrabngdmpgpfmjbo.supabase.co;
        proxy_pass https://rmrbxrabngdmpgpfmjbo.supabase.co/functions/v1/og-socio-html?slug=$socio_slug;
        proxy_intercept_errors on;
        error_page 500 502 503 504 = @og_fallback;
    }

    # Fallback si la edge function og-socio-html falla
    location @og_fallback {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # SPA routing default
    location / {
        try_files $uri $uri/ /index.html;
    }
}
