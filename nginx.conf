server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Headers para respuestas servidas por locations SIN add_header propio.
    # OJO: cada location de abajo que use add_header debe re-incluir los
    # snippets — nginx descarta la herencia si el location define alguno.
    include /etc/nginx/snippets/security-headers.conf;
    include /etc/nginx/snippets/csp.conf;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Cache para assets estaticos (hasheados por Vite → immutable)
    location ~* \.(js|css|png|jpg|jpeg|webp|gif|svg|ico|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Service Worker no debe cachearse.
    # Sin CSP a propósito: hace importScripts de www.gstatic.com (Firebase messaging).
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Manifest
    location = /manifest.json {
        expires off;
        add_header Cache-Control "no-cache";
        add_header Content-Type "application/manifest+json";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # index.html NUNCA se cachea — siempre sirve la ultima version
    location = /index.html {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        include /etc/nginx/snippets/security-headers.conf;
        include /etc/nginx/snippets/csp.conf;
    }

    # Apple Pay / Stripe domain verification (.well-known)
    location /.well-known/ {
        root /usr/share/nginx/html;
        default_type text/plain;
        add_header Cache-Control "no-cache";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # SPA routing (redirige internamente a /index.html, que aplica sus headers)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
