# Detecta crawlers / bots de redes sociales que generan link previews.
# Estos NO ejecutan JS, asi que les servimos HTML pre-renderizado con los
# meta tags Open Graph del socio via la edge function og-socio-html.
map $http_user_agent $is_social_crawler {
    default 0;
    "~*facebookexternalhit"    1;
    "~*facebot"                1;
    "~*twitterbot"             1;
    "~*linkedinbot"            1;
    "~*slackbot"               1;
    "~*discordbot"             1;
    "~*telegrambot"            1;
    "~*whatsapp"               1;
    "~*applebot"               1;
    "~*pinterest"              1;
    "~*redditbot"              1;
    "~*embedly"                1;
    "~*quora link preview"     1;
    "~*vkshare"                1;
    "~*w3c_validator"          1;
    "~*googlebot"              1;
    "~*bingbot"                1;
    "~*yandexbot"              1;
    "~*duckduckbot"            1;
    "~*baiduspider"            1;
    "~*skypeuripreview"        1;
    "~*msnbot"                 1;
    "~*flipboard"              1;
    "~*tumblr"                 1;
    "~*bitlybot"               1;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Resolver para proxy_pass dinamico a Supabase
    resolver 1.1.1.1 8.8.8.8 ipv6=off valid=300s;
    resolver_timeout 10s;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://js.stripe.com https://maps.googleapis.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com https://maps.googleapis.com https://nominatim.openstreetmap.org https://fcm.googleapis.com https://firebaseinstallations.googleapis.com https://www.gstatic.com;" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Cache para assets estaticos
    location ~* \.(js|css|png|jpg|jpeg|webp|gif|svg|ico|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service Worker no debe cachearse
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Manifest
    location = /manifest.json {
        expires off;
        add_header Cache-Control "no-cache";
        add_header Content-Type "application/manifest+json";
    }

    # index.html NUNCA se cachea — siempre sirve la ultima version
    location = /index.html {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Apple Pay / Stripe domain verification (.well-known)
    location /.well-known/ {
        root /usr/share/nginx/html;
        default_type text/plain;
        add_header Cache-Control "no-cache";
    }

    # Tienda publica del socio: si quien pide es un crawler, servimos HTML
    # con meta tags OG del socio. Usuarios reales reciben la SPA normal.
    location ~ ^/s/([a-zA-Z0-9][a-zA-Z0-9-]{0,80})/?$ {
        set $socio_slug $1;
        if ($is_social_crawler) {
            rewrite ^ /__og_socio last;
        }
        try_files $uri $uri/ /index.html;
    }

    # Endpoint interno que proxea a la edge function og-socio-html.
    # Solo accesible via rewrite interna (no expuesto al exterior).
    location = /__og_socio {
        internal;
        set $sb_anon "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtcmJ4cmFibmdkbXBncGZtamJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzAyNTksImV4cCI6MjA4OTYwNjI1OX0.Aj2VoA6XWcokJDJdhBwfNXnLCUEOlQfTdB0std1SNWE";
        set $sb_host "rmrbxrabngdmpgpfmjbo.supabase.co";
        proxy_set_header Host $sb_host;
        proxy_set_header Authorization "Bearer $sb_anon";
        proxy_set_header apikey $sb_anon;
        proxy_set_header User-Agent $http_user_agent;
        proxy_ssl_server_name on;
        proxy_ssl_name $sb_host;
        proxy_pass https://$sb_host/functions/v1/og-socio-html?slug=$socio_slug;
        proxy_intercept_errors on;
        error_page 500 502 503 504 = @og_fallback;
    }

    # Fallback si la edge function no responde: servir el index.html normal
    location @og_fallback {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
