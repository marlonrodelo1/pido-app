# Content-Security-Policy de pidoo.es (solo para respuestas HTML).
#
# ⚠️ Actualmente en modo REPORT-ONLY: el navegador loguea las violaciones en la
# consola pero NO bloquea nada. Tras verificar un pedido completo con tarjeta
# (Stripe PaymentElement + 3DS) sin violaciones en consola, cambiar el nombre
# del header a "Content-Security-Policy" para activarlo de verdad.
#
# Orígenes contemplados:
# - Stripe: js.stripe.com (script), frames js.stripe.com/hooks.stripe.com/m.stripe.network
#   (PaymentElement + 3DS), api/m/r.stripe.com (connect)
# - Google Maps: maps.googleapis.com + maps.gstatic.com (script/connect), tiles via img https:
# - Firebase push web: gstatic (script del SW aparte), fcm/fcmregistrations/firebaseinstallations
# - Supabase: *.supabase.co (REST/Auth/Storage) + wss (Realtime)
# - Nominatim: reverse geocoding
# - socio.pidoo.es: iframe de tracking del pedido
add_header Content-Security-Policy-Report-Only "default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' https://js.stripe.com https://maps.googleapis.com https://maps.gstatic.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; frame-src 'self' https://js.stripe.com https://hooks.stripe.com https://m.stripe.network https://socio.pidoo.es; worker-src 'self' blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com https://m.stripe.com https://r.stripe.com https://maps.googleapis.com https://maps.gstatic.com https://nominatim.openstreetmap.org https://fcm.googleapis.com https://fcmregistrations.googleapis.com https://firebaseinstallations.googleapis.com https://www.gstatic.com;" always;
