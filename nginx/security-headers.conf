# Headers de seguridad comunes. IMPORTANTE (gotcha nginx): cualquier location
# con su propio add_header DESCARTA los headers del bloque server, así que este
# snippet debe incluirse en CADA location que declare add_header.
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "microphone=(), camera=()" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
